# stockdata v2 部署（一键拉起见 ./up.sh）：
#   - PostgreSQL 使用物理机服务（127.0.0.1:5432），容器走 host 网络直连
#   - 单服务 app：NiceGUI Web（:8050）+ /api/sync/* + 唯一 baostock 同步 worker 线程
#   - Redis/Valkey 已不再需要（限流为进程内滑窗；任务状态在 PG）
#
# 同步任务的启动/进度两种方式等价（同一份 RunState）：
#   - Web:  http://127.0.0.1:8050/sync
#   - CLI:  uv run stockdata sync run --tui        （宿主机直连容器 API）
#           cron: uv run stockdata sync run --plain 或 curl -X POST .../api/sync/run
#
# ⚠️ baostock 登录惰性（启动不触网，首个同步任务才 login），且登录间隔红线（≥5min）
#    由 PG 持久化守卫强制——容器重启本身安全。

name: stockdata

services:
  app:
    image: stockdata
    build: .
    network_mode: host        # 直连物理机 127.0.0.1 的 PG
    env_file: .env            # STOCKDATA_PG_DSN 等
    restart: unless-stopped
    stop_grace_period: 60s    # 留时间完成当前切片事务 + 干净登出
    healthcheck:
      test: [ "CMD", ".venv/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/healthz', timeout=3)" ]
      interval: 30s
      timeout: 5s
      retries: 3
